<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablón de Misiones | HEX</title>
    <link rel="icon" type="image/png" href="../img/icon.png"> 
    <link rel="stylesheet" href="../stylemisiones.css">
</head>
<body>
    <div class="nav-bar">
        <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items:center;">
            <button onclick="window.location.href='../index.html'" class="btn-basic">⬅ Volver al Inicio</button>
            <button onclick="window.cambiarFiltroFinalizadas()" id="btn-filtro-fin" class="btn-basic">Ver Finalizadas: NO</button>
            <span class="badge-conectado">🟢 CONECTADO</span>
        </div>
        <button onclick="window.abrirMenuOP()" class="btn-op">⚙️ Acceso OP</button>
    </div>

    <div id="roster-container" class="roster-panel" ondragover="window.dragOver(event)" ondrop="window.dropToRoster(event)">
        <div id="roster-jugadores" class="roster-grid"></div>
    </div>

    <div id="tablon-misiones" class="tablon-grid">
        
        <div class="columna-mision" id="col-grandes" draggable="true" ondragstart="window.dragColStart(event, 'col-grandes')" ondragend="window.dragColEnd(event)" ondragover="window.dragColOver(event)" ondrop="window.dropCol(event, 'col-grandes')">
            <h2 class="col-title title-grandes">MISIONES GRANDES (<span id="count-grandes">0</span>/7)</h2>
            <div id="lista-grandes" class="lista-misiones"></div>
        </div>

        <div class="columna-mision" id="col-normales" draggable="true" ondragstart="window.dragColStart(event, 'col-normales')" ondragend="window.dragColEnd(event)" ondragover="window.dragColOver(event)" ondrop="window.dropCol(event, 'col-normales')">
            <h2 class="col-title title-normales">MISIONES NORMALES (<span id="count-normales">0</span>/14)</h2>
            <div id="lista-normales" class="lista-misiones"></div>
        </div>

        <div class="columna-mision" id="col-perso" draggable="true" ondragstart="window.dragColStart(event, 'col-perso')" ondragend="window.dragColEnd(event)" ondragover="window.dragColOver(event)" ondrop="window.dropCol(event, 'col-perso')">
            <h2 class="col-title title-perso">MISIONES PERSONALIZADAS</h2>
            <button onclick="window.abrirModalCrear('Personalizada')" class="btn-crear-mis">+ CREAR MISIÓN</button>
            <div id="lista-perso" class="lista-misiones"></div>
        </div>

        <div class="columna-mision oculto" id="col-op">
            <h2 class="col-title title-op">IDEAS OP (Ocultas)</h2>
            <div id="lista-op" class="lista-misiones"></div>
        </div>
    </div>

    <div id="modal-mision" class="hex-modal oculto">
        <div class="hex-modal-content" id="modal-content-window">
            <div class="modal-header" id="modal-drag-header">
                <span id="modal-title" style="font-weight:bold; color:var(--gold); pointer-events:none;">Misión</span>
                <span class="close-btn" onclick="window.cerrarModal()">×</span>
            </div>
            <div id="modal-body" class="modal-body-scroll"></div>
        </div>
    </div>

    <button id="btn-sync-global" class="btn-sync-float oculto" onclick="window.ejecutarSincronizacion()"></button>

    <script type="module" src="mis-main.js"></script>
</body>
</html>
