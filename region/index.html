<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa Regional | HEX ROL</title>
    <link rel="icon" type="image/png" href="../img/icon.png">
    <link rel="stylesheet" href="../styleregion.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Loader ── -->
<div id="loader-mapa">
    <div class="loader-title">✦ CARGANDO MAPA REGIONAL ✦</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div style="color:var(--text-dim); font-size:0.8em; font-family:sans-serif;">Conectando al servidor...</div>
</div>

<!-- ── Canvas ── -->
<canvas id="mapa-canvas"></canvas>

<!-- ── Navbar ── -->
<nav class="navbar">
    <div class="navbar-left">
        <button class="btn-nav" onclick="window.location.href='../index.html'">⬅ Volver</button>
        <button id="btn-volver-mapa" class="btn-nav" style="display:none;" onclick="window.volverMapaPadre()">↩ Subir</button>
        <span id="breadcrumb">📍 Mundo</span>
    </div>
    <div style="font-family:'Cinzel',serif; font-size:0.85em; font-weight:700; color:var(--gold); letter-spacing:0.08em;">
        🗺️ MAPA REGIONAL
    </div>
    <div class="navbar-right">
        <button id="btn-guardar-mapa" class="oculto solo-op" onclick="window.guardarMapaUI()" style="display:none;">💾 Guardar Cambios</button>
        <div id="hex-session-badge"></div>
        <button class="btn-nav" onclick="window.abrirMenuOP()">⚙️ OP</button>
    </div>
</nav>

<!-- ── Panel lateral ── -->
<aside id="panel-lateral">
    <div class="tabs-panel">
        <button class="tab-panel-btn activo" data-panel="props"    onclick="window.cambiarPanelUI('props')">🧱 Props</button>
        <button class="tab-panel-btn"        data-panel="regiones" onclick="window.cambiarPanelUI('regiones')">🌍 Regiones</button>
        <button class="tab-panel-btn"        data-panel="npcs"     onclick="window.cambiarPanelUI('npcs')">👤 NPCs</button>
        <button class="tab-panel-btn"        data-panel="misiones" onclick="window.cambiarPanelUI('misiones')">⚔️ Misiones</button>
        <button class="tab-panel-btn solo-op" data-panel="imagenes" onclick="window.cambiarPanelUI('imagenes')" style="display:none;">🖼️ Imgs</button>
    </div>
    <div id="panel-contenido"></div>
</aside>

<!-- ── Info hex seleccionado ── -->
<div id="panel-info-hex"></div>

<!-- ── Barra de herramientas (solo OP) ── -->
<div id="barra-herramientas" class="solo-op" style="display:none;">
    <button class="tool-btn activo" data-tool="pintar"     onclick="window.setHerramienta('pintar')"      title="Pintar (P)"><span class="icon">🖌️</span>Pintar</button>
    <button class="tool-btn"        data-tool="borrar"     onclick="window.setHerramienta('borrar')"      title="Borrar (B)"><span class="icon">🧹</span>Borrar</button>
    <button class="tool-btn"        data-tool="seleccionar" onclick="window.setHerramienta('seleccionar')" title="Seleccionar (S)"><span class="icon">🔲</span>Select</button>
    <button class="tool-btn"        data-tool="region"     onclick="window.setHerramienta('region')"      title="Pintar Región (R)"><span class="icon">🗺️</span>Región</button>
    <button class="tool-btn"        data-tool="mover"      onclick="window.setHerramienta('mover')"       title="Mover cámara (M)"><span class="icon">🤚</span>Mover</button>
    <div style="width:1px; background:var(--border); margin:0 4px;"></div>
    <button class="tool-btn" onclick="window.cambiarPanelUI('imagenes')" title="Gestionar imágenes"><span class="icon">🖼️</span>Imgs</button>
</div>

<!-- ── Modal ── -->
<div id="modal-region" class="oculto">
    <div class="modal-box">
        <div class="modal-header-reg">
            <span id="modal-titulo">Modal</span>
            <button class="modal-close" onclick="window.cerrarModalRegion()">✕</button>
        </div>
        <div id="modal-cuerpo"></div>
    </div>
</div>

<script type="module" src="region-main.js"></script>
</body>
</html>
