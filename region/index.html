<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa Regional | HEX ROL</title>
    <link rel="icon" type="image/png" href="../img/icon.png">
    <link rel="stylesheet" href="../styleregion.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="loader-mapa">
    <div class="loader-title">✦ CARGANDO MAPA REGIONAL ✦</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div style="color:var(--text-dim); font-size:0.8em; font-family:sans-serif;">Conectando al servidor...</div>
</div>

<canvas id="mapa-canvas"></canvas>

<nav class="navbar">
    <div class="navbar-left">
        <button class="btn-nav" onclick="window.location.href='../index.html'">⬅ Volver</button>
        <button id="btn-volver-mapa" class="btn-nav" style="display:none;" onclick="window.volverMapaPadre()">↩ Subir</button>
        <span id="breadcrumb"></span>
    </div>
    
    <div class="navbar-center solo-op" style="display:none;">
        <button class="btn-nav" id="btn-guardar-mapa" onclick="window.guardarMapaUI()" class="oculto">💾 Guardar Cambios</button>
    </div>
    
    <div class="navbar-right">
        <div id="hex-session-badge"></div>
    </div>
</nav>

<div class="panel-lateral">
    <div class="panel-tabs solo-op" style="display:none;">
        <button class="tab-panel-btn activo" data-panel="props"    onclick="window.cambiarPanelUI('props')">🧱 Props</button>
        <button class="tab-panel-btn"        data-panel="regiones" onclick="window.cambiarPanelUI('regiones')">🗺️ Regiones</button>
        <button class="tab-panel-btn"        data-panel="npcs"     onclick="window.cambiarPanelUI('npcs')">👤 NPCs</button>
        <button class="tab-panel-btn"        data-panel="misiones" onclick="window.cambiarPanelUI('misiones')">⚔️ Misiones</button>
    </div>
    <div id="panel-info-hex"></div>
    <div class="panel-scroll" id="panel-contenido"></div>
</div>

<div class="bottom-tools solo-op" style="display:none;">
    <button class="tool-btn activo" data-tool="agregar" onclick="window.setHerramienta('agregar')" title="Agregar (A)"><span class="icon">➕</span>Agregar</button>
    <button class="tool-btn"        data-tool="borrar"  onclick="window.setHerramienta('borrar')"  title="Borrar (B)"><span class="icon">🧹</span>Borrar</button>
    
    <div style="width:1px; background:var(--border); margin:0 4px;"></div>
    
    <button class="tool-btn"        data-tool="ingresar" onclick="window.setHerramienta('ingresar')" title="Ingresar a Región (I)"><span class="icon">🔽</span>Ingresar</button>
    <button class="tool-btn"        id="tool-salir" style="display:none; color:#ffcc00;" onclick="window.volverMapaPadre()" title="Salir al mapa superior (O)"><span class="icon">🔼</span>Salir</button>
    
    <div style="width:1px; background:var(--border); margin:0 4px;"></div>

    <button class="tool-btn"        data-tool="mover"   onclick="window.setHerramienta('mover')"   title="Mover cámara/Info (M)"><span class="icon">🤚</span>Mover</button>
    <button class="tool-btn" onclick="window.cambiarPanelUI('imagenes')" title="Gestionar imágenes"><span class="icon">🖼️</span>Imgs</button>
</div>

<div id="modal-region" class="oculto">
    <div class="modal-box">
        <div class="modal-header-reg">
            <span id="modal-titulo">Modal</span>
            <button class="btn-cerrar-modal" onclick="window.cerrarModalRegion()">✕</button>
        </div>
        <div id="modal-cuerpo" style="padding:15px;"></div>
    </div>
</div>

<div id="toast-region" class="toast-region"></div>

<script type="module" src="region-main.js"></script>

</body>
</html>
